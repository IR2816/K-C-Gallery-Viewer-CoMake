name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: |
          # Use GITHUB_RUN_NUMBER as the versionCode so every build gets a
          # unique Android versionCode, allowing installation over older APKs.
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.1.${{ github.run_number }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v1.1.${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
