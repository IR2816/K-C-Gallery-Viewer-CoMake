name: Build & Release Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    env:
      # Expose secrets as env vars so they can be checked in `if:` conditions
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Unit Tests
        run: flutter test --reporter=compact

      # ── Release signing (only when KEYSTORE_BASE64 secret is set) ──────────
      - name: Set up release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../keystore/release.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEYSTORE_KEY_PASSWORD" "$KEYSTORE_ALIAS" \
            > android/key.properties
          echo "✅ Release keystore configured"

      # ── Stable debug keystore fallback (when no release secrets are set) ────
      # Uses android/keystore/ci_debug.jks committed to the repo so every CI
      # build without KEYSTORE_BASE64 is signed with the *same* certificate.
      # This prevents Android "INSTALL_FAILED_UPDATE_INCOMPATIBLE" errors when
      # sideloading successive builds.
      - name: Set up stable debug keystore (fallback)
        if: env.KEYSTORE_BASE64 == ''
        run: |
          printf 'storePassword=ci_debug_pass\nkeyPassword=ci_debug_pass\nkeyAlias=ci_debug\nstoreFile=../keystore/ci_debug.jks\n' \
            > android/key.properties
          echo "✅ Stable debug keystore configured"

      # ── Compute version string ───────────────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            BUILD_NAME="${{ github.ref_name }}"
            BUILD_NAME="${BUILD_NAME#v}"   # strip leading 'v'
          else
            BUILD_NAME="1.1.${{ github.run_number }}"
          fi
          echo "build_name=$BUILD_NAME"   >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Release APK
        run: |
          flutter build apk --release \
            --build-number=${{ steps.version.outputs.build_number }} \
            --build-name=${{ steps.version.outputs.build_name }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kc-gallery-v${{ steps.version.outputs.build_name }}.apk

      # ── Upload artifact (every run) ──────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-v${{ steps.version.outputs.build_name }}
          path: build/app/outputs/flutter-apk/kc-gallery-*.apk

      # ── Create GitHub Release (tag pushes only) ──────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/kc-gallery-*.apk
          generate_release_notes: true
          name: KC Gallery Viewer v${{ steps.version.outputs.build_name }}
          tag_name: ${{ github.ref_name }}
